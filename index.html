<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucid CRM Widget</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  body { background: #fff; padding: 12px 14px; }
  .section { margin-bottom: 16px; }
  .section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.07em;
    color: #98a2b3;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .pill-grid { display: flex; flex-wrap: wrap; gap: 5px; }
  .pbtn {
    border: 1.5px solid #e4e7ec;
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    background: #fff;
    color: #344054;
    font-family: inherit;
    white-space: nowrap;
  }
  .pbtn.active {
    background: #ffcf57 !important;
    border-color: #111 !important;
    color: #111 !important;
    font-weight: 700;
  }
  .toast {
    display: none;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    color: #027a48;
    margin-top: 7px;
    background: #ecfdf3;
    padding: 4px 8px;
    border-radius: 4px;
    width: fit-content;
  }
  .toast.show { display: flex; }
  .error-toast {
    display: none;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    color: #b42318;
    margin-top: 7px;
    background: #fef3f2;
    padding: 4px 8px;
    border-radius: 4px;
    width: fit-content;
  }
  .error-toast.show { display: flex; }
  .no-location {
    font-size: 11px;
    color: #b42318;
    background: #fef3f2;
    padding: 8px 10px;
    border-radius: 6px;
    border: 1px solid #fca5a5;
    margin-bottom: 12px;
    display: none;
  }
</style>
</head>
<body>

<!--
  ╔══════════════════════════════════════════════════════════════════╗
  ║           LUCID CRM WIDGET — API KEY CONFIGURATION              ║
  ║                                                                  ║
  ║  When you onboard a new client:                                  ║
  ║  1. Get their Location ID from their GHL sub-account URL         ║
  ║     (the string after /location/ in the URL)                     ║
  ║  2. Create a Private Integration in their sub-account            ║
  ║  3. Add one line below: 'LOCATION_ID': 'API_KEY',               ║
  ║  That is it — the widget handles everything else automatically.  ║
  ╚══════════════════════════════════════════════════════════════════╝
-->

<script>
  // ── ADD YOUR CLIENTS HERE ──────────────────────────────────────────
  // Format: 'location_id': 'api_key',
  var API_KEYS = {
    'ONx7tJgmqhsNQzcqHzYP': 'pit-774abbc2-fc2f-4d45-8c76-b8f12c804c1e'
    // Add new clients below this line:
    // 'client2_location_id': 'client2_api_key',
    // 'client3_location_id': 'client3_api_key',
  };
  // ──────────────────────────────────────────────────────────────────

  var FIELD_KEY_STATUS  = 'lead_status';
  var FIELD_KEY_OUTCOME = 'call_outcome';

  // GHL passes locationId and contactId as URL parameters in the iframe
  var params     = new URLSearchParams(window.location.search);
  var locationId = params.get('locationId') || params.get('location_id') || params.get('companyId') || '';
  var contactId  = params.get('contactId')  || params.get('contact_id')  || '';
  var apiKey     = API_KEYS[locationId] || '';
</script>

<!-- Warning shown only when location ID is not in the lookup table yet -->
<div class="no-location" id="no-location-msg">
  Setup needed: add Location ID <strong id="location-id-display"></strong> to the widget file.
</div>

<!-- LEAD STATUS -->
<div class="section">
  <div class="section-label">Lead Status</div>
  <div class="pill-grid" id="ls-grid">
    <button class="pbtn" data-value="New Lead">New Lead</button>
    <button class="pbtn" data-value="No Answer">No Answer</button>
    <button class="pbtn" data-value="Disconnected Number">Disconnected Number</button>
    <button class="pbtn" data-value="Appointment Scheduled">Appointment Scheduled</button>
    <button class="pbtn" data-value="Appointment No Show">Appointment No Show</button>
    <button class="pbtn" data-value="CLOSED">CLOSED</button>
  </div>
  <div class="toast" id="ls-toast">&#10003; <span id="ls-toast-txt">Saved</span></div>
  <div class="error-toast" id="ls-error">&#10005; <span id="ls-error-txt">Error saving</span></div>
</div>

<!-- CALL OUTCOME -->
<div class="section">
  <div class="section-label">Call Outcome</div>
  <div class="pill-grid" id="co-grid">
    <button class="pbtn" data-value="Quoted follow up">Quoted follow up</button>
    <button class="pbtn" data-value="Banking Follow up">Banking Follow up</button>
    <button class="pbtn" data-value="Application started">Application started</button>
    <button class="pbtn" data-value="interested Follow Up">interested Follow Up</button>
    <button class="pbtn" data-value="Pivot follow up">Pivot follow up</button>
    <button class="pbtn" data-value="Referral follow up">Referral follow up</button>
    <button class="pbtn" data-value="Not Interested">Not Interested</button>
  </div>
  <div class="toast" id="co-toast">&#10003; <span id="co-toast-txt">Saved</span></div>
  <div class="error-toast" id="co-error">&#10005; <span id="co-error-txt">Error saving</span></div>
</div>

<script>
  // Show setup warning if location not found
  if (!apiKey && locationId) {
    var msg     = document.getElementById('no-location-msg');
    var display = document.getElementById('location-id-display');
    if (display) display.textContent = locationId;
    if (msg)     msg.style.display   = 'block';
  }

  // Load current values on open and highlight the active button
  function loadCurrentValues() {
    if (!contactId || !apiKey) return;
    fetch('https://services.leadconnectorhq.com/contacts/' + contactId, {
      headers: {
        'Authorization': 'Bearer ' + apiKey,
        'Version': '2021-07-28'
      }
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      var contact = data.contact || data;
      var fields  = contact.customFields || [];
      fields.forEach(function(f) {
        var key = f.fieldKey || '';
        if (key === 'contact.' + FIELD_KEY_STATUS)  markActive('ls-grid', f.value);
        if (key === 'contact.' + FIELD_KEY_OUTCOME) markActive('co-grid', f.value);
      });
    })
    .catch(function(e) { console.warn('Could not load contact:', e); });
  }

  // Highlight the button matching the current saved value
  function markActive(gridId, value) {
    if (!value) return;
    var grid = document.getElementById(gridId);
    if (!grid) return;
    grid.querySelectorAll('.pbtn').forEach(function(btn) {
      if (btn.getAttribute('data-value') === value) {
        btn.classList.add('active');
      }
    });
  }

  // Save the selected value to GHL via API
  function saveField(fieldKey, value, toastId, errorId) {
    if (!contactId || !apiKey) {
      showToast(toastId, 'Preview mode — no contact loaded');
      return;
    }
    fetch('https://services.leadconnectorhq.com/contacts/' + contactId, {
      method: 'PUT',
      headers: {
        'Authorization': 'Bearer ' + apiKey,
        'Version': '2021-07-28',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        customFields: [{ key: fieldKey, field_value: value }]
      })
    })
    .then(function(res) {
      if (res.ok) {
        showToast(toastId, '"' + value + '" saved');
      } else {
        res.json().then(function(e) {
          showError(errorId, e.message || 'Error ' + res.status);
        }).catch(function() {
          showError(errorId, 'Error ' + res.status);
        });
      }
    })
    .catch(function() {
      showError(errorId, 'Connection error');
    });
  }

  // Toast helpers
  var timers = {};
  function showToast(id, msg) {
    var el = document.getElementById(id);
    var tx = document.getElementById(id + '-txt');
    if (tx) tx.textContent = msg;
    if (el) {
      el.classList.add('show');
      clearTimeout(timers[id]);
      timers[id] = setTimeout(function() { el.classList.remove('show'); }, 2500);
    }
  }
  function showError(id, msg) {
    var el = document.getElementById(id);
    var tx = document.getElementById(id + '-txt');
    if (tx) tx.textContent = msg;
    if (el) {
      el.classList.add('show');
      clearTimeout(timers[id]);
      timers[id] = setTimeout(function() { el.classList.remove('show'); }, 3500);
    }
  }

  // Wire up all buttons in a grid
  function initGrid(gridId, fieldKey, toastId, errorId) {
    var grid = document.getElementById(gridId);
    if (!grid) return;

    grid.querySelectorAll('.pbtn').forEach(function(btn) {

      btn.addEventListener('mouseenter', function() {
        if (!btn.classList.contains('active')) {
          btn.style.background  = '#ffcf57';
          btn.style.borderColor = '#ffcf57';
          btn.style.color       = '#111';
        }
      });

      btn.addEventListener('mouseleave', function() {
        if (!btn.classList.contains('active')) {
          btn.style.background  = '#fff';
          btn.style.borderColor = '#e4e7ec';
          btn.style.color       = '#344054';
        }
      });

      btn.addEventListener('click', function() {
        // Deactivate all buttons in this grid
        grid.querySelectorAll('.pbtn').forEach(function(b) {
          b.classList.remove('active');
          b.style.background  = '#fff';
          b.style.borderColor = '#e4e7ec';
          b.style.color       = '#344054';
        });
        // Activate clicked button
        btn.classList.add('active');
        btn.style.background  = '#ffcf57';
        btn.style.borderColor = '#111';
        btn.style.color       = '#111';
        // Save to GHL
        saveField(fieldKey, btn.getAttribute('data-value'), toastId, errorId);
      });
    });
  }

  // Boot
  initGrid('ls-grid', FIELD_KEY_STATUS,  'ls-toast', 'ls-error');
  initGrid('co-grid', FIELD_KEY_OUTCOME, 'co-toast', 'co-error');
  loadCurrentValues();
</script>

</body>
</html>
